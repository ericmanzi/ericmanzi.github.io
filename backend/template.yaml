AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Bananagrams Online — WebSocket API + Lambda + DynamoDB
  Deploy with: sam build && sam deploy --guided

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        GAMES_TABLE: !Ref GamesTable
        CONNS_TABLE: !Ref ConnectionsTable

Resources:

  # ── DynamoDB ────────────────────────────────────────────────────────────────

  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bananagrams-games
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roomCode
          AttributeType: S
      KeySchema:
        - AttributeName: roomCode
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bananagrams-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Lambda ───────────────────────────────────────────────────────────────────

  GameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: handler.handler
      Description: Handles all WebSocket events for Bananagrams Online
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        # Allow sending messages back to WebSocket clients
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  GameFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GameFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  # ── API Gateway WebSocket ────────────────────────────────────────────────────

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: BananagramsWebSocket
      ProtocolType: WEBSOCKET
      # Lambda reads event.body.action to route messages
      RouteSelectionExpression: '$request.body.action'

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub >-
        arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GameFunction.Arn}/invocations

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub 'integrations/${WebSocketIntegration}'

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub 'integrations/${WebSocketIntegration}'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - DefaultRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      DeploymentId: !Ref WebSocketDeployment
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      # Max idle timeout (29000s ≈ 8h) prevents API Gateway from killing
      # connections while players are thinking between moves.
      # The hard connection limit is still 2 hours per AWS constraints.
      RouteSettings:
        $default:
          DataTraceEnabled: false

Outputs:
  WebSocketURL:
    Description: >
      Paste this URL into bananagrams-online/config.js as WS_URL
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  GamesTableName:
    Value: !Ref GamesTable

  ConnectionsTableName:
    Value: !Ref ConnectionsTable
